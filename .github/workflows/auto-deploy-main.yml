name: Auto Deploy Main

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  dispatch:
    name: Dispatch deploy workflow after approved main merge
    runs-on: ubuntu-latest
    steps:
      - name: Validate admin approval and dispatch deploy
        uses: actions/github-script@v7
        with:
          script: |
            const admins = ['govardhanreddy66', 'KFKishore23'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.after;
            const commitMessage = context.payload.head_commit?.message || 'Merged into main';

            const associatedPullRequests = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            const mergedPullRequest = associatedPullRequests.data
              .filter((pr) => pr.base.ref === 'main' && pr.merged_at)
              .sort((left, right) => new Date(right.merged_at) - new Date(left.merged_at))[0];

            if (!mergedPullRequest) {
              core.setFailed(`No merged pull request was found for commit ${sha}. Deployment only runs for approved pull request merges.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: mergedPullRequest.number,
              per_page: 100,
            });

            const approvalState = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!admins.includes(login) || login === mergedPullRequest.user.login) {
                continue;
              }

              if (review.state === 'APPROVED') {
                approvalState.set(login, 'APPROVED');
                continue;
              }

              if (review.state === 'CHANGES_REQUESTED' || review.state === 'DISMISSED') {
                approvalState.delete(login);
              }
            }

            const approvingAdmins = admins.filter((login) => approvalState.get(login) === 'APPROVED');
            if (approvingAdmins.length === 0) {
              core.setFailed(`PR #${mergedPullRequest.number} does not have an active admin approval. Deployment was not started.`);
              return;
            }

            const approvedBy = approvingAdmins[0];

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                git_ref: sha,
                branch_details: `Automatic deployment after merge of PR #${mergedPullRequest.number} (${mergedPullRequest.head.ref})`,
                code_review_notes: `Merged PR #${mergedPullRequest.number} approved by ${approvedBy}. Head commit: ${commitMessage}`,
                version_audit: 'true',
                deploy_target: 'all',
                approved_by: approvedBy,
              },
            });

            await core.summary
              .addHeading('Auto Deploy Dispatch')
              .addRaw(`Triggered \`deploy.yml\` for approved commit \`${sha}\`.`)
              .addBreak()
              .addRaw(`Merged PR: #${mergedPullRequest.number}`)
              .addBreak()
              .addRaw(`Approved by: ${approvedBy}`)
              .addBreak()
              .addRaw(`Head commit: ${commitMessage}`)
              .write();
