name: PR Governance

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - review_requested
      - review_request_removed
  pull_request_review:
    branches:
      - main
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    name: Enforce Policy
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate admin approval and merge checklist
        uses: actions/github-script@v7
        with:
          script: |
            const admins = ['govardhanreddy66', 'KFKishore23'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const isAdminAuthor = admins.includes(author);
            const body = pr.body || '';
            const failures = [];

            const teamNotifiedChecked = /-\s*\[x\]\s*Team has been notified before merge\./i.test(body);
            const adminApprovalRequestedChecked = /-\s*\[x\]\s*Admin approval requested from @govardhanreddy66 or @KFKishore23\./i.test(body);
            const requestedReviewers = (pr.requested_reviewers || []).map((reviewer) => reviewer.login);
            const adminReviewRequested = requestedReviewers.some((reviewer) => admins.includes(reviewer));

            if (!teamNotifiedChecked) {
              failures.push('Check "Team has been notified before merge." in the PR template before merging.');
            }

            if (!isAdminAuthor && !adminApprovalRequestedChecked) {
              failures.push('Check "Admin approval requested from @govardhanreddy66 or @KFKishore23." in the PR template.');
            }

            if (!isAdminAuthor && !adminReviewRequested) {
              failures.push('Request PR review from Govardhan or Kishore before merging into main.');
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const adminApprovalState = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!admins.includes(login)) {
                continue;
              }
              if (review.state === 'APPROVED') {
                adminApprovalState.set(login, 'APPROVED');
                continue;
              }
              if (review.state === 'CHANGES_REQUESTED' || review.state === 'DISMISSED') {
                adminApprovalState.delete(login);
              }
            }

            const approvingAdmins = admins.filter((login) => adminApprovalState.get(login) === 'APPROVED');
            if (!isAdminAuthor && approvingAdmins.length === 0) {
              failures.push('Wait for an approval from Govardhan or Kishore before merging into main.');
            }

            await core.summary
              .addHeading('PR Governance Result')
              .addRaw(`PR author: \`${author}\``)
              .addBreak()
              .addRaw(`Admin-authored PR: \`${isAdminAuthor}\``)
              .addBreak()
              .addRaw(`Team notified checkbox: \`${teamNotifiedChecked}\``)
              .addBreak()
              .addRaw(`Admin approval requested checkbox: \`${adminApprovalRequestedChecked}\``)
              .addBreak()
              .addRaw(`Admin reviewers requested: \`${adminReviewRequested}\``)
              .addBreak()
              .addRaw(`Approving admins: \`${approvingAdmins.join(', ') || 'none'}\``)
              .addBreak()
              .write();

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }
