name: PR Governance

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - review_requested
      - review_request_removed
  pull_request_review:
    branches:
      - main
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    name: Enforce Policy
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Require one admin approval
        uses: actions/github-script@v7
        with:
          script: |
            const admins = ['govardhanreddy66', 'KFKishore23'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const approvalState = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!admins.includes(login) || login === author) {
                continue;
              }

              if (review.state === 'APPROVED') {
                approvalState.set(login, 'APPROVED');
                continue;
              }

              if (review.state === 'CHANGES_REQUESTED' || review.state === 'DISMISSED') {
                approvalState.delete(login);
              }
            }

            const approvingAdmins = admins.filter((login) => approvalState.get(login) === 'APPROVED');

            await core.summary
              .addHeading('PR Governance Result')
              .addRaw(`PR author: \`${author}\``)
              .addBreak()
              .addRaw(`Approving admins: \`${approvingAdmins.join(', ') || 'none'}\``)
              .addBreak()
              .addRaw('Requirement: one admin approval from Govardhan or Kishore before merge into `main`.')
              .write();

            if (approvingAdmins.length === 0) {
              core.setFailed('A pull request into main requires one approval from Govardhan or Kishore.');
            }
