name: Code Quality & Security

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            governance:
              - '.github/**'
              - 'scripts/**'

      - name: Validate governance files
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.governance == 'true'
        run: |
          ruby -e 'require "yaml"; ARGV.each { |file| YAML.load_file(file); puts "ok #{file}" }' .github/workflows/*.yml
          bash -n scripts/log-maintenance.sh

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Frontend install
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Setup Python
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.backend == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Backend dependency install
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit

      - name: Security scan (Python dependencies)
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.backend == 'true'
        run: pip-audit --progress-spinner off

      - name: Security scan (Python source)
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.backend == 'true'
        run: bandit -r backend -x backend/Piper

      - name: Frontend dependency audit
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm audit --audit-level=high
